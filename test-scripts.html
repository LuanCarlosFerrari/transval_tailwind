<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Scripts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center">Teste de Scripts JavaScript</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Status dos Scripts -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h3 class="text-xl font-semibold mb-4 text-blue-600">
                    <i class="fas fa-code mr-2"></i>
                    Status dos Scripts
                </h3>
                <div id="script-status" class="space-y-2">
                    <!-- Status será preenchido via JavaScript -->
                </div>
            </div>

            <!-- Funcionalidades -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h3 class="text-xl font-semibold mb-4 text-green-600">
                    <i class="fas fa-cogs mr-2"></i>
                    Funcionalidades
                </h3>
                <div class="space-y-2">
                    <button id="test-modal" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded">
                        Testar Modal
                    </button>
                    <button id="test-auth" class="w-full bg-green-500 hover:bg-green-600 text-white py-2 px-4 rounded">
                        Verificar Auth
                    </button>
                </div>
            </div>
        </div>

        <!-- Console de Logs -->
        <div class="mt-6 bg-gray-900 p-4 rounded-lg">
            <h3 class="text-white font-semibold mb-2">Console de Logs:</h3>
            <div id="console-logs" class="text-green-400 font-mono text-sm max-h-40 overflow-y-auto">
                <!-- Logs serão adicionados aqui -->
            </div>
        </div>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-blue-500 hover:underline">← Voltar para o site</a>
        </div>
    </div>

    <!-- Scripts para testar -->
    <script src="src/config/supabase.js"></script>
    <script src="src/scripts/auth.js"></script>
    <script src="src/scripts/confirm-modal.js"></script>
    <script src="src/scripts/contact.js"></script>
    <script src="src/scripts/clientes.js"></script>
    <script src="src/scripts/presentation.js"></script>
    
    <script>
        const statusDiv = document.getElementById('script-status');
        const logsDiv = document.getElementById('console-logs');

        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = `text-${type === 'error' ? 'red' : type === 'success' ? 'green' : 'blue'}-400`;
            logEntry.textContent = `[${timestamp}] ${message}`;
            logsDiv.appendChild(logEntry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function checkScriptStatus(name, condition) {
            const statusItem = document.createElement('div');
            statusItem.className = 'flex items-center space-x-2';
            
            const icon = document.createElement('i');
            icon.className = condition ? 'fas fa-check text-green-500' : 'fas fa-times text-red-500';
            
            const text = document.createElement('span');
            text.textContent = `${name}: ${condition ? 'OK' : 'ERRO'}`;
            text.className = condition ? 'text-green-600' : 'text-red-600';
            
            statusItem.appendChild(icon);
            statusItem.appendChild(text);
            statusDiv.appendChild(statusItem);

            addLog(`${name}: ${condition ? 'Carregado com sucesso' : 'Falhou ao carregar'}`, condition ? 'success' : 'error');
        }

        document.addEventListener('DOMContentLoaded', () => {
            addLog('Iniciando testes de scripts...');

            // Verificar scripts após um pequeno delay
            setTimeout(() => {
                // Verificar Supabase
                checkScriptStatus('Supabase Config', typeof window.SupabaseAuth !== 'undefined');
                
                // Verificar AuthManager
                checkScriptStatus('Auth Manager', typeof window.AuthManager !== 'undefined');
                
                // Verificar ConfirmModal
                checkScriptStatus('Confirm Modal', typeof window.ConfirmModal !== 'undefined');
                
                // Verificar se as funções de inicialização existem
                checkScriptStatus('Contact Script', typeof initContact === 'function');
                
                // Verificar se não há erros de export
                try {
                    addLog('Todos os scripts carregaram sem erros de sintaxe', 'success');
                } catch (error) {
                    addLog(`Erro detectado: ${error.message}`, 'error');
                }

                addLog('Testes concluídos!');
            }, 1000);
        });

        // Testes de funcionalidade
        document.getElementById('test-modal').addEventListener('click', async () => {
            if (window.ConfirmModal) {
                const result = await window.ConfirmModal.show({
                    title: 'Teste de Modal',
                    message: 'Este é um teste do sistema de modals!',
                    type: 'info'
                });
                addLog(`Modal testado: ${result ? 'Confirmado' : 'Cancelado'}`, 'success');
            } else {
                addLog('Modal não está disponível', 'error');
            }
        });

        document.getElementById('test-auth').addEventListener('click', () => {
            if (window.AuthManager) {
                const isAuth = window.AuthManager.isAuthenticated();
                const user = window.AuthManager.getCurrentUser();
                addLog(`Auth Status: ${isAuth ? 'Logado' : 'Não logado'}`, isAuth ? 'success' : 'info');
                if (user) {
                    addLog(`Usuário: ${user.email}`, 'info');
                }
            } else {
                addLog('AuthManager não está disponível', 'error');
            }
        });
    </script>
</body>
</html>
