<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentos - Transval</title>
    <link rel="icon" type="image/png" href="Assets/logo-branca-transval.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* Animações personalizadas para o modal */
        .modal-enter {
            opacity: 0;
            transform: scale(0.95);
        }

        .modal-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: opacity 300ms, transform 300ms;
        }

        .modal-exit {
            opacity: 1;
            transform: scale(1);
        }

        .modal-exit-active {
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 300ms, transform 300ms;
        }
    </style>
</head>

<body class="font-sans text-base text-gray-800 bg-blue-950 pt-16 md:pt-20 relative">
    <!-- HEADER START -->
    <header
        class="fixed top-0 left-0 w-full z-[702] bg-gradient-to-r from-blue-900 via-blue-950 to-gray-900 bg-opacity-90 shadow-lg transition-all duration-300">
        <!-- Logout Button (Left) -->
        <div class="hidden md:flex absolute left-0 top-1/2 -translate-y-1/2 pl-4 z-50">
            <button id="logout-btn"
                class="bg-[#01a1ef] hover:bg-[#008bd1] text-white px-6 py-3 rounded-full font-bold transition-all duration-300 w-[90px] h-[44px] flex items-center justify-center">
                <span class="logout-text">Sair</span>
                <span class="logout-loading hidden">
                    <i class="fas fa-spinner fa-spin"></i>
                </span>
            </button>
        </div>
        <div class="container mx-auto flex justify-center items-center py-4 px-6 relative">
            <!-- User Info (Right) -->
            <div class="hidden md:flex absolute right-0 top-1/2 -translate-y-1/2 pr-4 z-50">
                <div id="user-info" class="text-white text-sm flex items-center space-x-2">
                    <i class="fas fa-user-circle text-lg"></i>
                    <span id="user-email" class="font-medium"></span>
                </div>
            </div>
            <!-- Navigation Menu (Center) -->
            <nav class="hidden md:flex justify-center items-center">
                <span class="text-white text-xl font-bold">Documentos</span>
            </nav>
            <!-- Hamburger Menu Button (Mobile, Centered) -->
            <button id="mobile-menu-btn"
                class="md:hidden text-white text-2xl focus:outline-none absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">
                <i class="fas fa-bars"></i>
            </button>
        </div> <!-- Mobile Menu Dropdown -->
        <div id="mobile-menu" class="hidden md:hidden bg-blue-950 text-white px-6 py-4 space-y-4">
            <!-- User Info Mobile -->
            <div id="user-info-mobile" class="text-white text-sm flex items-center justify-center space-x-2 mb-4">
                <i class="fas fa-user-circle text-lg"></i>
                <span id="user-email-mobile" class="font-medium"></span>
            </div>
            <div class="flex items-center justify-center mb-4">
                <span class="text-white text-xl font-bold">Documentos</span>
            </div>
            <button id="logout-btn-mobile"
                class="block bg-[#01a1ef] hover:bg-[#008bd1] text-white px-6 py-3 rounded-full text-center font-bold w-[90px] h-[44px] flex items-center justify-center mx-auto">
                <span class="logout-text">Sair</span>
                <span class="logout-loading hidden">
                    <i class="fas fa-spinner fa-spin"></i>
                </span>
            </button>
        </div>
        <script>
            document.getElementById('mobile-menu-btn').addEventListener('click', function () {
                document.getElementById('mobile-menu').classList.toggle('hidden');
            });
        </script>
    </header>
    <!-- HEADER END -->
    <div class="container mx-auto p-4">
        <!-- Welcome Message -->
        <div id="welcome-message"
            class="hidden bg-gradient-to-r from-green-500 to-green-600 text-white p-4 rounded-lg shadow-lg mb-6">
            <div class="flex items-center space-x-3">
                <i class="fas fa-check-circle text-2xl"></i>
                <div>
                    <h3 class="font-bold text-lg">Bem-vindo!</h3>
                    <p class="text-green-100">Login realizado com sucesso. Você pode acessar os documentos abaixo.</p>
                </div>
            </div>
        </div>

        <div id="file-browser" class="mt-8">
            <!-- As pastas e arquivos serão inseridos aqui via JavaScript -->
            <noscript>
                <div class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded">
                    <strong>Aviso:</strong> JavaScript está desabilitado ou não está funcionando. Os documentos não
                    serão exibidos.
                </div>
            </noscript>
            <div id="loading-indicator" class="text-center text-white">
                <i class="fas fa-spinner fa-spin"></i> Carregando documentos...
            </div>
        </div>
    </div>

    <!-- Modal Structure -->
    <div id="folder-modal" class="fixed inset-0 bg-black bg-opacity-75 z-[800] hidden items-center justify-center p-4">
        <div class="bg-gray-50 rounded-xl shadow-2xl w-full max-w-2xl mx-auto flex flex-col" style="max-height: 90vh;">
            <div class="flex justify-between items-center p-5 border-b border-gray-200">
                <h2 id="modal-title" class="text-2xl font-bold text-gray-800"></h2>
                <button id="close-folder-modal-btn"
                    class="w-8 h-8 bg-blue-500 hover:bg-blue-600 text-white rounded-full flex items-center justify-center transition-colors duration-200">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div id="modal-content" class="p-6 bg-gray-100 overflow-y-auto">
                <!-- O conteúdo da pasta (lista de arquivos) será inserido aqui -->
            </div>
        </div>
    </div> <!-- Modal de Confirmação de Logout -->
    <div id="logout-modal"
        class="fixed inset-0 bg-black bg-opacity-75 z-[900] hidden items-center justify-center p-4 transition-all duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-auto border border-gray-200 transform transition-all duration-300 scale-95"
            id="logout-modal-content">
            <div class="p-6">
                <!-- Header do Modal -->
                <div class="flex items-center space-x-3 mb-6">
                    <div
                        class="w-12 h-12 bg-gradient-to-r from-red-500 to-red-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-sign-out-alt text-white text-xl"></i>
                    </div>
                    <div>
                        <h3 class="text-xl font-bold text-gray-800">Confirmar Logout</h3>
                        <p class="text-gray-500 text-sm">Você será desconectado do sistema</p>
                    </div>
                </div>
                <!-- Conteúdo -->
                <div class="mb-6">
                    <p class="text-gray-700 mb-3">Tem certeza que deseja sair? Você precisará fazer login novamente para
                        acessar os documentos.</p>
                    <div class="bg-gray-50 p-3 rounded-lg flex items-center space-x-2">
                        <i class="fas fa-user text-gray-500"></i>
                        <span class="text-sm text-gray-600">Conectado como: <span id="logout-user-email"
                                class="font-semibold"></span></span>
                    </div>
                </div>

                <!-- Botões -->
                <div class="flex space-x-3">
                    <button id="logout-cancel-btn"
                        class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3 px-4 rounded-xl transition-all duration-200">
                        <i class="fas fa-times mr-2"></i>
                        Cancelar
                    </button>
                    <button id="logout-confirm-btn"
                        class="flex-1 bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white font-semibold py-3 px-4 rounded-xl transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span class="logout-confirm-text">
                            <i class="fas fa-sign-out-alt mr-2"></i>
                            Sair
                        </span>
                        <span class="logout-confirm-loading hidden">
                            <i class="fas fa-spinner fa-spin mr-2"></i>
                            Saindo...
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </div> <!-- Scripts do Supabase e Autenticação -->
    <script src="src/config/supabase.js"></script>
    <script src="src/scripts/auth.js"></script>
    <script src="src/scripts/confirm-modal.js"></script>
    <script src="src/scripts/documents.js"></script>

    <script>
        // Verificar autenticação ao carregar a página
        document.addEventListener('DOMContentLoaded', async () => {
            // Aguardar AuthManager estar pronto
            while (!window.AuthManager || !window.AuthManager.isInitialized) {
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            // Verificar se o usuário tem acesso
            const hasAccess = await window.AuthManager.checkDocumentAccess();

            if (hasAccess) {
                console.log('Usuário autenticado, carregando documentos...');
                // Mostrar informações do usuário no header
                const currentUser = window.AuthManager.getCurrentUser();
                if (currentUser && currentUser.email) {
                    const userEmailEl = document.getElementById('user-email');
                    const userEmailMobileEl = document.getElementById('user-email-mobile');

                    if (userEmailEl) userEmailEl.textContent = currentUser.email;
                    if (userEmailMobileEl) userEmailMobileEl.textContent = currentUser.email;                    // Mostrar mensagem de boas-vindas apenas se for um login recente
                    const welcomeMessage = document.getElementById('welcome-message');
                    const urlParams = new URLSearchParams(window.location.search);
                    const isLoginSuccess = urlParams.get('login') === 'success';
                    const hasShownWelcome = sessionStorage.getItem('transval_welcome_shown');

                    // Mostrar mensagem apenas se:
                    // 1. Veio de um login (parâmetro login=success na URL) OU
                    // 2. Ainda não foi mostrada nesta sessão
                    if (welcomeMessage && (isLoginSuccess || !hasShownWelcome)) {
                        welcomeMessage.classList.remove('hidden');

                        // Marcar que a mensagem já foi mostrada nesta sessão
                        sessionStorage.setItem('transval_welcome_shown', 'true');

                        // Limpar parâmetro da URL após mostrar a mensagem
                        if (isLoginSuccess) {
                            const newUrl = window.location.pathname;
                            window.history.replaceState({}, document.title, newUrl);
                        }

                        // Esconder a mensagem após 5 segundos
                        setTimeout(() => {
                            welcomeMessage.style.opacity = '0';
                            welcomeMessage.style.transition = 'opacity 0.5s ease-out';
                            setTimeout(() => {
                                welcomeMessage.style.display = 'none';
                            }, 500);
                        }, 5000);
                    }
                }

                // Aqui você pode adicionar código para carregar os documentos
            }            // Configurar botões de logout
            const logoutBtn = document.getElementById('logout-btn');
            const logoutBtnMobile = document.getElementById('logout-btn-mobile');

            const handleLogout = async (button) => {
                // Aguardar ConfirmModal estar disponível
                while (!window.ConfirmModal) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                }

                // Obter informações do usuário para mostrar no modal
                const currentUser = window.AuthManager.getCurrentUser();
                const userEmail = currentUser ? currentUser.email : 'Usuário';
                // Mostrar modal de confirmação
                const confirmed = await window.ConfirmModal.show({
                    title: 'Confirmar Logout',
                    subtitle: 'Você será desconectado do sistema',
                    message: 'Tem certeza que deseja sair? Você precisará fazer login novamente para acessar os documentos.',
                    confirmText: 'Sair',
                    cancelText: 'Cancelar',
                    confirmIcon: 'fas fa-sign-out-alt',
                    type: 'danger',
                    cancelStyle: 'blue',
                    extra: {
                        icon: 'fas fa-user',
                        text: `Conectado como: <span class="font-semibold">${userEmail}</span>`
                    },
                    loadingText: 'Saindo...'
                });

                if (!confirmed) return;

                // Mostrar loading no modal
                window.ConfirmModal.setLoading(true);

                // Também mostrar loading no botão original
                const logoutText = button.querySelector('.logout-text');
                const logoutLoading = button.querySelector('.logout-loading');

                button.disabled = true;
                if (logoutText && logoutLoading) {
                    logoutText.classList.add('hidden');
                    logoutLoading.classList.remove('hidden');
                }

                try {
                    await window.AuthManager.logout();
                } finally {
                    // Restaurar botão (caso não redirecione)
                    button.disabled = false;
                    if (logoutText && logoutLoading) {
                        logoutText.classList.remove('hidden');
                        logoutLoading.classList.add('hidden');
                    }
                    window.ConfirmModal.setLoading(false);
                }
            };

            // Event listeners
            logoutBtn.addEventListener('click', () => handleLogout(logoutBtn));
            logoutBtnMobile.addEventListener('click', () => handleLogout(logoutBtnMobile));
        });

        // Script do menu mobile (mantendo funcionalidade existente)
        document.getElementById('mobile-menu-btn').addEventListener('click', function () {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
    </script>
</body>

</html>
